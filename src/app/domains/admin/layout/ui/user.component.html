<button
  class="flex w-full cursor-pointer items-center gap-x-3 rounded-xl p-2 text-left hover:bg-neutral-700/10 dark:hover:bg-neutral-300/10"
  [matMenuTriggerFor]="userMenu">
  <img class="size-4 rounded-lg" src="/assets/images/logo/logo.svg" alt="User avatar" />
  <div class="flex min-w-0 flex-auto flex-col select-none">
    <div class="truncate font-medium">Autumn Eyes 2023</div>
    <div class="text-on-surface-variant truncate text-md">
      autumneyes2023&#64;hmpmaster.com
    </div>
  </div>
  <mat-icon class="size-4" svgIcon="ellipsis-vertical" />
</button>

<mat-menu class="min-w-60" xPosition="before" yPosition="above" #userMenu="matMenu">
  <button class="py-2 [&>span]:flex [&>span]:items-center" mat-menu-item>
    <img class="size-4 rounded-lg" src="/assets/images/logo/logo.svg" alt="User avatar" />
    <div class="ml-3 flex min-w-0 flex-auto flex-col select-none">
      <div class="truncate font-medium">Administrator</div>
      <div class="text-on-surface-variant truncate text-sm">
        admin&#64;hmpmaster.com
      </div>
    </div>
  </button>
  <mat-divider />
  <a mat-menu-item routerLink="/billing/plan">
    <mat-icon svgIcon="sparkles" />
    Upgrade to Pro
  </a>
  <mat-divider />
  <!-- <button mat-menu-item>
        <mat-icon svgIcon="user-round" />
        Account
      </button>
      <button mat-menu-item>
        <mat-icon svgIcon="wallet" />
        Billing
      </button> -->
  <a mat-menu-item routerLink="/settings/notifications">
    <mat-icon svgIcon="bell" />
    Notifications
  </a>
  <mat-divider />
  <button mat-menu-item [matMenuTriggerFor]="appearanceMenu">
    <mat-icon svgIcon="sun-moon" />
    Appearance
  </button>
  <mat-divider />
  <button mat-menu-item routerLink="/auth/sign-in">
    <mat-icon svgIcon="log-out" />
    Sign out
  </button>
</mat-menu>

<mat-menu #appearanceMenu="matMenu">
  @for (item of schemes; track item.value) {
  <button mat-menu-item (click)="updateScheme(item.value)">
    <mat-pseudo-checkbox appearance="minimal" class="mr-2"
      [state]="scheme() === item.value ? 'checked' : 'unchecked'" />
    <span>{{ item.label }}</span>
  </button>
  }
</mat-menu>

<div class="flex flex-col gap-y-4">
  @for (section of navigation(); track section.id) {
  <div class="flex flex-col px-4 lg:pr-2">
    <div class="px-2.5 py-1.5 text-md font-semibold tracking-wide uppercase">
      {{ section.label }}
      @if (section.description) {
      <div class="mt-0.5 text-sm font-medium normal-case text-neutral-500">
        {{ section.description }}
      </div>
      }
    </div>

    <ul ngTree class="mt-1 flex flex-col gap-y-0.5" [nav]="true" #tree="ngTree">
      <ng-template [ngTemplateOutlet]="treeNodes" [ngTemplateOutletContext]="{
                nodes: section.children,
                parent: tree,
              }" />
    </ul>

    <ng-template let-nodes="nodes" let-parent="parent" #treeNodes>
      @for (node of nodes; track node.id) {
      @if (node.children?.length) {
      <button type="button" cdkMonitorElementFocus ngTreeItem
        class="navigation-item flex w-full cursor-pointer items-center gap-x-2 rounded-lg px-2.5 py-2 text-left text-neutral-600 transition-colors duration-150 select-none hover:bg-neutral-100 dark:text-neutral-300 dark:hover:bg-neutral-800/70"
        [class.font-semibold]="hasActiveChild(node)" [class.text-primary-800]="hasActiveChild(node)"
        [class.dark:text-neutral-100]="hasActiveChild(node)" [parent]="parent" [value]="node.id" [label]="node.label"
        [disabled]="node.disabled" [selectable]="false" [expanded]="node.expanded ?? false"
        (expandedChange)="onExpandedChange(node, $event)" #treeItem="ngTreeItem">
        @if (node.icon) {
        <mat-icon class="pointer-events-none size-4 shrink-0" [svgIcon]="node.icon" />
        }
        <span class="flex-auto">{{ node.label }}</span>
        <mat-icon svgIcon="chevron-right"
          class="pointer-events-none size-4 shrink-0 transition-transform duration-200 ease-out"
          [class.rotate-90]="node.expanded" />
      </button>

      <ul class="grid transition-[grid-template-rows] duration-200 ease-in-out" [class.grid-rows-[0fr]]="!node.expanded"
        [class.grid-rows-[1fr]]="node.expanded" role="group">
        <div class="min-h-0 overflow-hidden">
          <ul class="mt-0.5 flex flex-col gap-y-0.5 pb-0.5 [&>.navigation-item]:pl-8.5">
            <ng-template ngTreeItemGroup [ownedBy]="treeItem" #group="ngTreeItemGroup">
              <ng-template [ngTemplateOutlet]="treeNodes" [ngTemplateOutletContext]="{
                            nodes: node.children,
                            parent: group,
                          }" />
            </ng-template>
          </ul>
        </div>
      </ul>
      } @else {
      <a cdkMonitorElementFocus ngTreeItem
        class="navigation-item flex cursor-pointer items-center gap-x-2 rounded-lg px-2.5 py-2 text-neutral-600 transition-colors duration-150 select-none hover:bg-neutral-100 dark:text-neutral-300 dark:hover:bg-neutral-800/70"
        routerLinkActive="bg-primary-50 font-semibold text-primary-800 hover:bg-primary-100 dark:bg-neutral-800 dark:text-neutral-50 dark:hover:bg-neutral-700"
        [parent]="parent" [value]="node.id" [label]="node.label" [disabled]="node.disabled" [selectable]="true"
        [routerLink]="node.route" [routerLinkActiveOptions]="{ exact: true }">
        @if (node.icon) {
        <mat-icon class="pointer-events-none size-4 shrink-0" [svgIcon]="node.icon" />
        }
        <span class="flex-auto font-medium">{{ node.label }}</span>
      </a>
      }
      }
    </ng-template>
  </div>
  }
</div>
